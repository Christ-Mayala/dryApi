# ============================================================
# Docker Compose — DRY API Framework
# Services: API, MongoDB, Redis, Nginx (optionnel)
# ============================================================

version: '3.8'

services:
  # ------------------------------
  # API DRY
  # ------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dryapi-app
    restart: unless-stopped
    ports:
      - '${PORT:-5000}:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/dryapi
      - REDIS_URL=redis://redis:6379
      - REDIS_ENABLED=true
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - LOG_LEVEL=info
      - PROMETHEUS_ENABLED=true
    volumes:
      - logs:/app/logs
      - uploads:/app/uploads
      - downloads:/app/downloads
      - backups:/app/backups
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:5000/health/live']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - dryapi-network

  # ------------------------------
  # MongoDB
  # ------------------------------
  mongodb:
    image: mongo:7
    container_name: dryapi-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      - MONGO_INITDB_DATABASE=dryapi
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - dryapi-network

  # ------------------------------
  # Redis
  # ------------------------------
  redis:
    image: redis:7-alpine
    container_name: dryapi-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - dryapi-network

  # ------------------------------
  # Nginx (Proxy inverse - optionnel)
  # ------------------------------
  nginx:
    image: nginx:alpine
    container_name: dryapi-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - dryapi-network
    profiles:
      - nginx
      - full

# ------------------------------
# Volumes
# ------------------------------
volumes:
  mongodata:
    driver: local
  redisdata:
    driver: local
  logs:
    driver: local
  uploads:
    driver: local
  downloads:
    driver: local
  backups:
    driver: local

# ------------------------------
# Réseau
# ------------------------------
networks:
  dryapi-network:
    driver: bridge
