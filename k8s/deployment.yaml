apiVersion: apps/v1
kind: Deployment
metadata:
  name: dry-api
  namespace: dryapi
  labels:
    app: dry-api
    version: "1.0.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: dry-api
  template:
    metadata:
      labels:
        app: dry-api
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: app
          image: dryapi:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              protocol: TCP
              name: http
          envFrom:
            - configMapRef:
                name: dry-api-config
            - secretRef:
                name: dry-api-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /health/startup
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          volumeMounts:
            - name: logs
              mountPath: /app/logs
            - name: uploads
              mountPath: /app/uploads
            - name: downloads
              mountPath: /app/downloads
            - name: backups
              mountPath: /app/backups
      volumes:
        - name: logs
          emptyDir: {}
        - name: uploads
          emptyDir: {}
        - name: downloads
          emptyDir: {}
        - name: backups
          emptyDir: {}
      terminationGracePeriodSeconds: 30
