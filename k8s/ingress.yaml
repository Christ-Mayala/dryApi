apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dry-api-ingress
  namespace: dryapi
  labels:
    app: dry-api
  annotations:
    # TLS
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Rate limiting (nginx ingress)
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-rpm: "6000"
    nginx.ingress.kubernetes.io/limit-whitelist: "10.0.0.0/8"
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origins: "https://app.dryapi.io,https://admin.dryapi.io"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    # Taille max upload
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Timeouts
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # SSL
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.dryapi.io
      secretName: dry-api-tls
  rules:
    - host: api.dryapi.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dry-api-service
                port:
                  number: 5000
