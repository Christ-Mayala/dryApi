apiVersion: 1

# Règles d'alerte Grafana (unified alerting) pour DRY API.
# À placer dans le dossier de provisioning Grafana, ex:
#   /etc/grafana/provisioning/alerting/dry-api-rules.yml
# ou via Grafana → Alerting → Alert rules → Import.
#
# Reprend les seuils déjà documentés en prose dans readme.md, mais sous
# forme de règles réellement importables/actives (ce qui manquait).
#
# Ces règles portent sur des métriques d'infrastructure (taux d'erreur 5xx,
# latence, disponibilité, mémoire) — volontairement PAS sur des événements
# métier attendus (mauvais mot de passe, etc.), qui sont visibles dans le
# panel "Échecs de connexion (401 sur /login)" du dashboard sans déclencher
# d'alerte (cohérent avec dry/middlewares/error/errorHandler.js#isClientError).

groups:
  - orgId: 1
    name: dry-api-alerts
    folder: DRY API
    interval: 1m
    rules:
      - uid: dry-availability-low
        title: "Disponibilité < 99.9%"
        condition: C
        data:
          - refId: A
            datasourceUid: Prometheus
            model:
              expr: "sum(rate(dry_http_requests_total{status=~\"2..\"}[5m])) / sum(rate(dry_http_requests_total[5m])) * 100"
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [99.9] }
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disponibilité sous 99.9% depuis 5 minutes"
          description: "Vérifier /health/ready, les logs d'erreur, et l'état de MongoDB/Redis."

      - uid: dry-error-rate-high
        title: "Taux d'erreur 5xx > 5%"
        condition: C
        data:
          - refId: A
            datasourceUid: Prometheus
            model:
              expr: "sum(rate(dry_http_requests_total{status=~\"5..\"}[5m])) / sum(rate(dry_http_requests_total[5m])) * 100"
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [5] }
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Taux d'erreurs serveur (5xx) supérieur à 5% depuis 5 minutes"
          description: "Voir le panel 'Top 10 erreurs par endpoint' et logs/error-<date>.log pour la cause exacte."

      - uid: dry-latency-p95-high
        title: "Latence p95 > 2s"
        condition: C
        data:
          - refId: A
            datasourceUid: Prometheus
            model:
              expr: "histogram_quantile(0.95, sum(rate(dry_http_request_duration_seconds_bucket[5m])) by (le))"
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [2] }
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Temps de réponse p95 supérieur à 2 secondes depuis 5 minutes"
          description: "Vérifier la charge DB (dry_db_query_duration_seconds), le cache Redis, et les endpoints lents."

      - uid: dry-memory-high
        title: "Mémoire RSS élevée"
        condition: C
        data:
          - refId: A
            datasourceUid: Prometheus
            model:
              expr: "process_resident_memory_bytes / 1024 / 1024"
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [1024] }
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Mémoire RSS au-dessus de 1024 MB depuis 10 minutes"
          description: "Risque de scaling nécessaire ou fuite mémoire — vérifier le panel 'Utilisation mémoire'."
