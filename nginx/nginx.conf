# ============================================================
# Configuration Nginx — DRY API Framework
# Proxy inverse avec SSL, rate limiting et compression
# ============================================================

# Limites de taux globales
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_conn_zone $binary_remote_addr zone=addr_limit:10m;

# Taille max upload
client_max_body_size 10M;

upstream dryapi {
    least_conn;
    server app:5000 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

# ------------------------------
# HTTP → HTTPS redirection
# ------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name api.dryapi.io;

    # Redirection vers HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # ACME challenge pour Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

# ------------------------------
# HTTPS
# ------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.dryapi.io;

    # SSL (configurer avec Certbot/Let's Encrypt)
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Gzip
    gzip on;
    gzip_types application/json application/javascript text/css text/plain;
    gzip_min_length 1000;
    gzip_vary on;

    # Rate limiting
    limit_req zone=api_limit burst=20 nodelay;
    limit_conn addr_limit 10;

    # Logging
    access_log /var/log/nginx/api.access.log;
    error_log /var/log/nginx/api.error.log warn;

    # Proxy vers l'API
    location / {
        proxy_pass http://dryapi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Buffers
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Header pour tracing
        add_header X-Request-ID $request_id;
    }

    # WebSocket support
    location /socket.io/ {
        proxy_pass http://dryapi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # Endpoint health check (pas de rate limiting)
    location /health/ {
        limit_req off;
        proxy_pass http://dryapi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Métriques Prometheus
    location /metrics {
        limit_req off;
        proxy_pass http://dryapi;
    }
}
